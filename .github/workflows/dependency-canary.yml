name: Dependency Canary

on:
  schedule:
    - cron: "0 6 * * 4"
  workflow_dispatch:

jobs:
  canary:
    name: Canary against latest tooling
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and latest tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install --upgrade --upgrade-strategy eager pytest ruff mypy build

      - name: Canary quality checks
        run: |
          ruff check kernels implementations tests
          mypy kernels implementations
          pytest -q

      - name: Canary build
        run: python -m build
