name: Dependency Health

on:
  pull_request:
    branches: [main, master]
    paths:
      - "pyproject.toml"
      - ".github/workflows/**"
  push:
    branches: [main, master]
    paths:
      - "pyproject.toml"
      - ".github/workflows/**"
  schedule:
    - cron: "0 4 * * 2"
  workflow_dispatch:

jobs:
  dependency-health:
    name: Dependency health (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dependency tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pip-audit
          if [ "${{ matrix.python-version }}" != "3.9" ]; then
            pip install "filelock>=3.20.3"
          fi

      - name: Validate dependency graph
        run: pip check

      - name: Audit known vulnerabilities
        run: |
          if [ "${{ matrix.python-version }}" = "3.9" ]; then
            pip-audit \
              --skip-editable \
              --ignore-vuln GHSA-w853-jp5j-5j7f \
              --ignore-vuln GHSA-qmgc-5h2g-mvrw \
              --ignore-vuln GHSA-gc5v-m9x4-r6x2
          else
            pip-audit \
              --skip-editable \
              --ignore-vuln GHSA-gc5v-m9x4-r6x2
          fi

      - name: Ensure package still imports
        run: python -c "import kernels; print('kernels import OK')"
