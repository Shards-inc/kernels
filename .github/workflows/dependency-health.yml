name: Dependency Health

on:
  pull_request:
    branches: [main, master]
    paths:
      - "pyproject.toml"
      - ".github/workflows/**"
  push:
    branches: [main, master]
    paths:
      - "pyproject.toml"
      - ".github/workflows/**"
  schedule:
    - cron: "0 4 * * 2"
  workflow_dispatch:

jobs:
  dependency-health:
    name: Dependency health (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dependency tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pip-audit

      - name: Validate dependency graph
        run: pip check

      - name: Audit known vulnerabilities
        run: pip-audit

      - name: Ensure package still imports
        run: python -c "import kernels; print('kernels import OK')"
